<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viaje Catarmarca 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --negro:#0f0f0f; --gris1:#1a1a1a; --gris2:#242424; --gris3:#2e2e2e; --gris4:#3a3a3a;
      --borde:#333; --texto:#e8e8e8; --suave:#888;
      --verde:#4ade80; --rojo:#f87171; --amarillo:#fbbf24; --azul:#60a5fa; --naranja:#fb923c;
      --blanco:#ffffff;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--negro);color:var(--texto);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px}

    /* LOADING */
    .loading-screen{position:fixed;inset:0;background:var(--negro);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px}
    .loading-screen.hide{display:none}
    .spinner{width:36px;height:36px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-txt{font-size:.82em;color:var(--suave);letter-spacing:1px}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gris3);border:1px solid var(--borde);border-radius:10px;padding:10px 18px;font-size:.8em;font-weight:700;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .toast.ok{border-color:var(--verde);color:var(--verde)}
    .toast.err{border-color:var(--rojo);color:var(--rojo)}

    /* HEADER */
    .header{background:var(--gris1);border-bottom:1px solid var(--borde);padding:15px 14px 11px;position:sticky;top:0;z-index:50}
    .header-inner{max-width:640px;margin:auto;display:flex;align-items:flex-end;justify-content:space-between}
    .header h1{font-family:'Bebas Neue',sans-serif;font-size:1.85em;letter-spacing:1px;line-height:1;color:var(--blanco)}
    .header-fecha{font-size:.7em;color:var(--suave);letter-spacing:.5px}
    .header-right{display:flex;align-items:center;gap:8px}
    .header-badge{background:var(--verde);color:var(--negro);font-size:.68em;font-weight:700;padding:3px 10px;border-radius:20px}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--verde)}
    .sync-dot.syncing{background:var(--amarillo);animation:pulse .8s ease infinite}
    .sync-dot.err{background:var(--rojo)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* TABS */
    .tabs{max-width:640px;margin:0 auto;display:flex;background:var(--gris1);border-bottom:1px solid var(--borde);position:sticky;top:58px;z-index:40;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:1;min-width:68px;padding:10px 5px;text-align:center;font-size:.68em;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--suave);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
    .tab.active{color:var(--verde);border-bottom-color:var(--verde)}

    /* CONTENT */
    .content{max-width:640px;margin:0 auto;padding:13px}
    .section{display:none}
    .section.active{display:block}
    .sec-title{font-family:'Bebas Neue',sans-serif;font-size:.95em;letter-spacing:1px;color:var(--suave);margin:13px 0 7px;text-transform:uppercase}

    /* DASH */
    .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
    .dash-card{background:var(--gris2);border:1px solid var(--borde);border-radius:11px;padding:11px;text-align:center}
    .dash-num{font-family:'Bebas Neue',sans-serif;font-size:1.9em;line-height:1}
    .dash-label{font-size:.58em;color:var(--suave);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
    .pago-bar-wrap{background:var(--gris2);border:1px solid var(--borde);border-radius:13px;padding:13px 14px;margin-bottom:9px}
    .pago-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
    .pago-bar-label{font-size:.8em;font-weight:700;color:var(--blanco)}
    .pago-bar-pct{font-family:'Bebas Neue',sans-serif;font-size:1.05em;color:var(--verde)}
    .bar-track{background:var(--gris4);border-radius:5px;height:7px;overflow:hidden}
    .bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--verde),#86efac);transition:width .5s ease}
    .pago-bar-sub{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
    .pago-bar-sub span{font-size:.65em;color:var(--suave)}
    .pago-bar-sub b{font-weight:700}

    /* CARDS */
    .card{background:var(--gris2);border:1px solid var(--borde);border-radius:13px;padding:12px 13px;margin-bottom:8px}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:7px}
    .card-nombre{font-weight:700;font-size:.93em;color:var(--blanco)}
    .card-sub{font-size:.7em;color:var(--suave);margin-top:2px}
    .card-actions{display:flex;gap:5px;flex-shrink:0}
    .btn-icon{font-size:.7em;padding:4px 9px;border-radius:6px;border:1px solid var(--borde);background:var(--gris3);color:var(--suave);cursor:pointer;white-space:nowrap;transition:background .15s;font-family:'DM Sans',sans-serif}
    .btn-icon:hover{background:var(--gris4)}
    .btn-icon.red{border-color:var(--rojo);color:var(--rojo);background:rgba(248,113,113,.08)}
    .btn-icon.red:hover{background:rgba(248,113,113,.2)}
    .card-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--borde)}
    .card-detail.open{display:block}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .detail-item label{font-size:.58em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--suave);display:block;margin-bottom:1px}
    .detail-item span{font-size:.8em}
    .detail-item.full{grid-column:1/-1}
    .doc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
    .doc-badge{font-size:.66em;font-weight:700;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid;transition:all .15s;user-select:none}
    .doc-badge.ok{background:rgba(74,222,128,.15);color:var(--verde);border-color:var(--verde)}
    .doc-badge.falta{background:rgba(248,113,113,.12);color:var(--rojo);border-color:var(--rojo)}

    /* PAGOS */
    .pago-tipos{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
    .pago-tipo-btn{font-size:.7em;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;border:1px solid var(--borde);background:var(--gris2);color:var(--suave);transition:all .15s;font-family:'DM Sans',sans-serif}
    .pago-tipo-btn.active{background:var(--verde);color:var(--negro);border-color:var(--verde)}
    .pago-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--borde);gap:8px}
    .pago-row:last-child{border-bottom:none}
    .pago-nombre{font-size:.83em;font-weight:500;flex:1}
    .pago-estado{font-size:.66em;font-weight:700;padding:4px 9px;border-radius:20px;cursor:pointer;user-select:none;border:1px solid;min-width:90px;text-align:center;transition:all .15s}
    .pago-estado.pagado{background:rgba(74,222,128,.15);color:var(--verde);border-color:var(--verde)}
    .pago-estado.parcial{background:rgba(251,191,36,.15);color:var(--amarillo);border-color:var(--amarillo)}
    .pago-estado.debe{background:rgba(248,113,113,.12);color:var(--rojo);border-color:var(--rojo)}
    .pago-estado.noaplica{background:rgba(251,146,60,.12);color:var(--naranja);border-color:var(--naranja)}

    /* VIAJE */
    .viaje-cols{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .viaje-card{background:var(--gris2);border:1px solid var(--borde);border-radius:13px;padding:13px}
    .viaje-card-title{font-family:'Bebas Neue',sans-serif;font-size:.95em;margin-bottom:9px;display:flex;align-items:center;gap:7px}
    .viaje-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--borde);font-size:.8em}
    .viaje-item:last-child{border-bottom:none}
    .vtoggle{width:17px;height:17px;border-radius:4px;border:2px solid var(--borde);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65em;transition:all .15s}
    .vtoggle.colectivo{background:rgba(74,222,128,.2);border-color:var(--verde);color:var(--verde)}
    .vtoggle.propio{background:rgba(251,146,60,.15);border-color:var(--naranja);color:var(--naranja)}
    .vtoggle.none{background:transparent;border-color:var(--borde);color:var(--suave)}
    .viaje-empty{font-size:.75em;color:var(--suave);font-style:italic;padding:6px 0}
    .viaje-leyenda{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .vley-item{display:flex;align-items:center;gap:5px;font-size:.72em;color:var(--suave)}
    .vley-dot{width:10px;height:10px;border-radius:3px}

    /* HABITACIONES */
    .hab-list{display:flex;flex-direction:column;gap:9px}
    .hab-card{background:var(--gris2);border:1px solid var(--borde);border-radius:13px;padding:13px}
    .hab-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .hab-nombre{font-family:'Bebas Neue',sans-serif;font-size:1em;color:var(--blanco);flex:1}
    .hab-cap-select{background:var(--gris3);border:1px solid var(--borde);border-radius:7px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:.75em;padding:4px 8px;outline:none;cursor:pointer}
    .hab-cap-badge{font-size:.65em;color:var(--suave)}
    .hab-num-input{background:var(--gris3);border:1px solid var(--borde);border-radius:7px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:.75em;padding:4px 8px;outline:none;width:80px}
    .hab-num-input:focus{border-color:var(--verde)}
    .hab-ocupantes{list-style:none;margin-bottom:6px}
    .hab-ocupante{font-size:.78em;padding:5px 0;border-bottom:1px solid var(--borde);display:flex;align-items:center;gap:5px}
    .hab-ocupante:last-child{border-bottom:none}
    .hab-remove{margin-left:auto;font-size:.62em;color:var(--rojo);cursor:pointer;padding:1px 5px;border-radius:3px;border:1px solid var(--rojo);background:rgba(248,113,113,.08)}
    .hab-empty{font-size:.72em;color:var(--suave);font-style:italic;padding:4px 0}
    .hab-select{width:100%;background:var(--gris3);border:1px solid var(--borde);border-radius:7px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:.76em;padding:5px 7px;outline:none}
    .hab-llena{font-size:.72em;color:var(--amarillo);padding:5px 0;font-style:italic}
    .hab-delete{font-size:.62em;color:var(--rojo);cursor:pointer;padding:3px 7px;border-radius:5px;border:1px solid var(--rojo);background:rgba(248,113,113,.08)}

    /* BF */
    .buenafe-table{width:100%;border-collapse:collapse;font-size:.73em}
    .buenafe-table th{background:var(--gris3);color:var(--suave);font-size:.62em;letter-spacing:1px;text-transform:uppercase;padding:7px;text-align:left;border-bottom:1px solid var(--borde)}
    .buenafe-table td{padding:7px;border-bottom:1px solid var(--borde);vertical-align:middle}
    .buenafe-table tr:last-child td{border-bottom:none}
    .buenafe-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
    .num-col{color:var(--suave);font-size:.8em;width:22px}

    /* BOTONES */
    .btn-add{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px;background:var(--gris3);border:1px dashed var(--borde);border-radius:11px;color:var(--suave);font-family:'DM Sans',sans-serif;font-weight:700;font-size:.8em;cursor:pointer;margin-top:8px;transition:all .2s}
    .btn-add:hover{border-color:var(--verde);color:var(--verde)}
    .btn-primary{background:var(--verde);color:var(--negro);border:none;border-radius:9px;padding:9px 17px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.82em;cursor:pointer;transition:opacity .15s}
    .btn-primary:hover{opacity:.85}
    .btn-cancel{background:var(--gris3);color:var(--texto);border:1px solid var(--borde);border-radius:9px;padding:9px 15px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.82em;cursor:pointer}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.83);z-index:100;align-items:flex-end;justify-content:center;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:var(--gris1);border-radius:20px 20px 0 0;border:1px solid var(--borde);width:100%;max-width:640px;padding:19px 15px 36px;animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.35em;color:var(--blanco);margin-bottom:13px}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
    .modal-field.full{grid-column:1/-1}
    .modal-field label{font-size:.58em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--suave);display:block;margin-bottom:3px}
    .modal-field input,.modal-field select{width:100%;background:var(--gris3);border:1px solid var(--borde);border-radius:9px;color:var(--texto);font-family:'DM Sans',sans-serif;font-size:.87em;padding:9px 11px;outline:none;transition:border-color .2s}
    .modal-field input:focus,.modal-field select:focus{border-color:var(--verde)}
    .modal-actions{display:flex;gap:8px;flex-wrap:wrap}

    @media print{
      .header,.tabs,.btn-add,.btn-primary,.btn-cancel,.card-actions,.pago-tipos,.loading-screen,.toast{display:none!important}
      body{background:white;color:black}
      .buenafe-table th{background:#eee;color:#333}
      .buenafe-table td{color:#111;border-color:#ccc}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-txt">Conectando con Supabase…</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>⚽ Catamarca 2026</h1>
      <div class="header-fecha">29 Abr — 3 May 2025</div>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot" title="Estado conexión"></div>
      <div class="header-badge" id="badge-total">0 personas</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active"  onclick="switchTab('resumen',this)">📊 Resumen</div>
  <div class="tab"         onclick="switchTab('jugadores',this)">👥 Jugadores</div>
  <div class="tab"         onclick="switchTab('pagos',this)">💰 Pagos</div>
  <div class="tab"         onclick="switchTab('viaje',this)">🚌 Viaje</div>
  <div class="tab"         onclick="switchTab('habitaciones',this)">🏨 Hab.</div>
  <div class="tab"         onclick="switchTab('buenafe',this)">📋 Lista BF</div>
</div>

<div class="content">
  <section class="section active" id="sec-resumen">
    <div class="dash-grid" id="dash-totales"></div>
    <div class="sec-title">Estado de pagos</div>
    <div id="dash-barras"></div>
  </section>
  <section class="section" id="sec-jugadores">
    <div id="lista-jugadores"></div>
    <button class="btn-add" onclick="abrirModal()">+ Agregar jugador</button>
  </section>
  <section class="section" id="sec-pagos">
    <div class="pago-tipos">
      <button class="pago-tipo-btn active" onclick="filtrarPago('todos',this)">Todos</button>
      <button class="pago-tipo-btn" onclick="filtrarPago('inscripcion',this)">Inscripción</button>
      <button class="pago-tipo-btn" onclick="filtrarPago('hotel',this)">Hotel</button>
      <button class="pago-tipo-btn" onclick="filtrarPago('viaje',this)">Transporte</button>
    </div>
    <div class="card"><div id="lista-pagos"></div></div>
  </section>
  <section class="section" id="sec-viaje">
    <div class="sec-title">Medio de transporte</div>
    <div class="viaje-leyenda">
      <div class="vley-item"><div class="vley-dot" style="background:var(--verde)"></div>Colectivo grupal</div>
      <div class="vley-item"><div class="vley-dot" style="background:var(--naranja)"></div>Por su cuenta</div>
      <div class="vley-item"><div class="vley-dot" style="background:var(--borde)"></div>Sin definir</div>
    </div>
    <div class="viaje-cols">
      <div class="viaje-card">
        <div class="viaje-card-title" style="color:var(--verde)">🚌 Colectivo <span id="col-count" style="font-size:.7em;color:var(--suave)"></span></div>
        <div id="lista-colectivo"></div>
      </div>
      <div class="viaje-card">
        <div class="viaje-card-title" style="color:var(--naranja)">🚗 Por su cuenta <span id="propio-count" style="font-size:.7em;color:var(--suave)"></span></div>
        <div id="lista-propio"></div>
      </div>
    </div>
    <div style="margin-top:9px">
      <div class="viaje-card">
        <div class="viaje-card-title" style="color:var(--suave)">❓ Sin definir <span id="sin-count" style="font-size:.7em"></span></div>
        <div id="lista-sin"></div>
      </div>
    </div>
  </section>
  <section class="section" id="sec-habitaciones">
    <div class="sec-title">Habitaciones</div>
    <div class="hab-list" id="hab-list"></div>
    <button class="btn-add" onclick="agregarHabitacion()">+ Nueva habitación</button>
  </section>
  <section class="section" id="sec-buenafe">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;flex-wrap:wrap;gap:7px">
      <div class="sec-title" style="margin:0">Lista de Buena Fe</div>
      <button class="btn-primary" onclick="window.print()">🖨 Imprimir</button>
    </div>
    <div style="overflow-x:auto"><table class="buenafe-table" id="buenafe-table"></table></div>
  </section>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="cerrarModalOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nuevo jugador</div>
    <div class="modal-grid">
      <div class="modal-field"><label>Nombre *</label><input type="text" id="f-nombre" placeholder="Juan"></div>
      <div class="modal-field"><label>Apellido *</label><input type="text" id="f-apellido" placeholder="Pérez"></div>
      <div class="modal-field"><label>DNI</label><input type="text" id="f-dni" placeholder="12345678"></div>
      <div class="modal-field"><label>Fecha de nacimiento</label><input type="date" id="f-fnac"></div>
      <div class="modal-field"><label>Tomo</label><input type="text" id="f-tomo" placeholder="—"></div>
      <div class="modal-field"><label>Folio</label><input type="text" id="f-folio" placeholder="—"></div>
      <div class="modal-field full"><label>Profesión / Título / Matrícula</label><input type="text" id="f-titulo" placeholder="Abogado, Contador..."></div>
      <div class="modal-field full"><label>Rol</label>
        <select id="f-rol"><option value="jugador">Jugador</option><option value="comitiva">Comitiva</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="guardarJugador()">Guardar</button>
      <button class="btn-cancel"  onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>

let jugadores    = [];
let pagos        = [];  // [{jugador_id, tipo, estado}]
let habitaciones = [];  // [{id, nombre, capacidad, nro, ocupantes:[jugador_id]}]

// ── TOAST ───────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, tipo='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(tipo==='err'?'err':'ok');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function setSyncing(state){ // 'ok'|'syncing'|'err'
  const dot=document.getElementById('sync-dot');
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='err'?' err':'');
}

// ── CARGA INICIAL ───────────────────────────────────────────────────────
async function init(){
  setSyncing('syncing');
  try {
    // cargar jugadores
    const {data:jData, error:jErr} = await sb.from('jugadores').select('*').order('apellido');
    if(jErr) throw jErr;

    // si no hay datos, migrar lista inicial
    if(jData.length===0){
      const {error:insErr} = await sb.from('jugadores').insert(INIT);
      if(insErr) throw insErr;
      // insertar pagos iniciales
      const pagoRows=[];
      INIT.forEach(j=>TIPOS.forEach(t=>pagoRows.push({jugador_id:j.id,tipo:t,estado:'debe'})));
      await sb.from('pagos').insert(pagoRows);
      jugadores=INIT.map(j=>({...j,docs:{dni:j.doc_dni,titulo:j.doc_titulo}}));
    } else {
      jugadores=jData.map(j=>({...j,docs:{dni:j.doc_dni,titulo:j.doc_titulo}}));
    }

    // cargar pagos
    const {data:pData, error:pErr} = await sb.from('pagos').select('*');
    if(pErr) throw pErr;
    pagos=pData;

    // cargar habitaciones
    const {data:hData, error:hErr} = await sb.from('habitaciones').select('*').order('id');
    if(hErr) throw hErr;
    const {data:ocData, error:ocErr} = await sb.from('hab_ocupantes').select('*');
    if(ocErr) throw ocErr;
    habitaciones=hData.map(h=>({
      ...h,
      ocupantes: ocData.filter(o=>o.habitacion_id===h.id).map(o=>o.jugador_id)
    }));

    setSyncing('ok');
    document.getElementById('loading-screen').classList.add('hide');
    renderJugadores();
    renderResumen();
    actualizarBadge();

  } catch(e){
    setSyncing('err');
    document.getElementById('loading-screen').classList.add('hide');
    toast('Error al conectar: '+e.message,'err');
    console.error(e);
  }
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='resumen')      renderResumen();
  if(tab==='pagos')        renderPagos(filtroActivo);
  if(tab==='viaje')        renderViaje();
  if(tab==='habitaciones') renderHabitaciones();
  if(tab==='buenafe')      renderBuenaFe();
}

function abrirModal(idx=null){
  editIdx=idx;
  document.getElementById('modal-title').textContent=idx!==null?'Editar jugador':'Nuevo jugador';
  const campos=['nombre','apellido','dni','fnac','tomo','folio','titulo'];
  if(idx!==null){
    const j=jugadores[idx];
    campos.forEach(c=>document.getElementById('f-'+c).value=j[c]||'');
    document.getElementById('f-rol').value=j.rol||'jugador';
  }else{
    campos.forEach(c=>document.getElementById('f-'+c).value='');
    document.getElementById('f-rol').value='jugador';
  }
  document.getElementById('modal').classList.add('open');
}
function cerrarModal(){document.getElementById('modal').classList.remove('open')}
function cerrarModalOverlay(e){if(e.target.id==='modal')cerrarModal()}

async function guardarJugador(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const apellido=document.getElementById('f-apellido').value.trim();
  if(!nombre||!apellido){alert('Nombre y apellido son obligatorios.');return}
  const datos={
    nombre,apellido,
    dni:   document.getElementById('f-dni').value.trim(),
    fnac:  document.getElementById('f-fnac').value||null,
    tomo:  document.getElementById('f-tomo').value.trim(),
    folio: document.getElementById('f-folio').value.trim(),
    titulo:document.getElementById('f-titulo').value.trim(),
    rol:   document.getElementById('f-rol').value,
    transporte: editIdx!==null?jugadores[editIdx].transporte:'none',
    doc_dni:    editIdx!==null?jugadores[editIdx].doc_dni:false,
    doc_titulo: editIdx!==null?jugadores[editIdx].doc_titulo:false,
  };
  setSyncing('syncing');
  try{
    if(editIdx!==null){
      const {error}=await sb.from('jugadores').update(datos).eq('id',jugadores[editIdx].id);
      if(error)throw error;
      jugadores[editIdx]={...jugadores[editIdx],...datos,docs:{dni:datos.doc_dni,titulo:datos.doc_titulo}};
      toast('Jugador actualizado');
    }else{
      datos.id=Date.now();
      const {error}=await sb.from('jugadores').insert(datos);
      if(error)throw error;
      // insertar pagos
      await sb.from('pagos').insert(TIPOS.map(t=>({jugador_id:datos.id,tipo:t,estado:'debe'})));
      jugadores.push({...datos,docs:{dni:false,titulo:false}});
      toast('Jugador agregado');
    }
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  cerrarModal();
  renderJugadores();
  actualizarBadge();
}

async function eliminarJugador(idx){
  const j=jugadores[idx];
  if(!j)return;
  if(!confirm('¿Eliminar a '+j.nombre+' '+j.apellido+'?'))return;
  setSyncing('syncing');
  try{
    const {error}=await sb.from('jugadores').delete().eq('id',j.id);
    if(error)throw error;
    jugadores.splice(idx,1);
    pagos=pagos.filter(p=>p.jugador_id!==j.id);
    habitaciones.forEach(h=>{h.ocupantes=h.ocupantes.filter(id=>id!==j.id)});
    toast('Jugador eliminado');
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderJugadores();
  actualizarBadge();
}

async function toggleDoc(idx,doc){
  const j=jugadores[idx];
  const campo='doc_'+doc;
  const nuevo=!j[campo];
  setSyncing('syncing');
  try{
    const {error}=await sb.from('jugadores').update({[campo]:nuevo}).eq('id',j.id);
    if(error)throw error;
    j[campo]=nuevo;
    j.docs[doc]=nuevo;
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderJugadores();
}

function toggleDetalle(idx){
  const el=document.getElementById('det-'+idx);
  const btn=document.getElementById('bexp-'+idx);
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'Ocultar':'Ver';
}

function renderJugadores(){
  const cont=document.getElementById('lista-jugadores');
  if(!jugadores.length){cont.innerHTML='<div style="text-align:center;color:var(--suave);padding:36px 0;font-size:.86em">Sin jugadores.</div>';return}
  let html='';
  [{label:'Jugadores',lista:jugadores.filter(j=>j.rol!=='comitiva')},
   {label:'Comitiva', lista:jugadores.filter(j=>j.rol==='comitiva')}
  ].forEach(g=>{
    if(!g.lista.length)return;
    html+=`<div class="sec-title">${g.label} (${g.lista.length})</div>`;
    g.lista.forEach(j=>{html+=cardJugador(j,jugadores.indexOf(j))});
  });
  cont.innerHTML=html;
}

function cardJugador(j,i){
  const dOk=j.doc_dni,tOk=j.doc_titulo;
  const alerta=(!dOk||!tOk)?' <span style="color:var(--amarillo);font-size:.68em">⚠</span>':'';
  const fnac=j.fnac?new Date(j.fnac+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
  const tf=j.tomo?(j.folio?`T° ${j.tomo} - F° ${j.folio}`:j.tomo):'—';
  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="card-nombre">${j.apellido}, ${j.nombre}${alerta}</div>
        <div class="card-sub">${j.rol}${j.dni?' · '+j.dni:''}</div>
      </div>
      <div class="card-actions">
        <button class="btn-icon" id="bexp-${i}" onclick="toggleDetalle(${i})">Ver</button>
        <button class="btn-icon" onclick="abrirModal(${i})">✏</button>
        <button class="btn-icon red" onclick="eliminarJugador(${i})">✕</button>
      </div>
    </div>
    <div class="doc-badges">
      <span class="doc-badge ${dOk?'ok':'falta'}" onclick="toggleDoc(${i},'dni')">${dOk?'✓':'✗'} DNI</span>
      <span class="doc-badge ${tOk?'ok':'falta'}" onclick="toggleDoc(${i},'titulo')">${tOk?'✓':'✗'} Título/Matr.</span>
    </div>
    <div class="card-detail" id="det-${i}">
      <div class="detail-grid">
        <div class="detail-item"><label>F. Nac.</label><span>${fnac}</span></div>
        <div class="detail-item"><label>DNI</label><span>${j.dni||'—'}</span></div>
        <div class="detail-item full"><label>T° y F°</label><span>${tf}</span></div>
        ${j.titulo?`<div class="detail-item full"><label>Profesión</label><span>${j.titulo}</span></div>`:''}
      </div>
    </div>
  </div>`;
}

// ── RESUMEN ─────────────────────────────────────────────────────────────
function renderResumen(){
  const jug=jugadores.filter(j=>j.rol!=='comitiva').length;
  const com=jugadores.filter(j=>j.rol==='comitiva').length;
  const docOk=jugadores.filter(j=>j.doc_dni&&j.doc_titulo).length;
  document.getElementById('dash-totales').innerHTML=`
    <div class="dash-card"><div class="dash-num" style="color:var(--azul)">${jug}</div><div class="dash-label">Jugadores</div></div>
    <div class="dash-card"><div class="dash-num" style="color:var(--amarillo)">${com}</div><div class="dash-label">Comitiva</div></div>
    <div class="dash-card"><div class="dash-num" style="color:var(--verde)">${docOk}/${jugadores.length}</div><div class="dash-label">Docs OK</div></div>`;
  let html='';
  TIPOS.forEach(tipo=>{
    let nP=0,nPar=0,nD=0,nNA=0,tot=0;
    jugadores.forEach(j=>{
      const p=pagos.find(p=>p.jugador_id===j.id&&p.tipo===tipo);
      const e=p?.estado||'debe';
      if(e==='noaplica'){nNA++;return}
      tot++;
      if(e==='pagado')nP++;else if(e==='parcial')nPar++;else nD++;
    });
    const pct=tot?Math.round(nP/tot*100):0;
    html+=`<div class="pago-bar-wrap">
      <div class="pago-bar-header"><div class="pago-bar-label">${TLABELS[tipo]}</div><div class="pago-bar-pct">${pct}% al día</div></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="pago-bar-sub">
        <span>✓ Pagado: <b style="color:var(--verde)">${nP}</b></span>
        <span>◑ Parcial: <b style="color:var(--amarillo)">${nPar}</b></span>
        <span>✗ Debe: <b style="color:var(--rojo)">${nD}</b></span>
        ${nNA?`<span>— Por su cuenta: <b>${nNA}</b></span>`:''}
      </div>
    </div>`;
  });
  document.getElementById('dash-barras').innerHTML=html;
}

function filtrarPago(tipo,btn){

  btn.classList.add('active');

async function cicloPago(tipo,jId){
  const estados=tipo==='viaje'?EST_VIA:EST_STD;
  const p=pagos.find(p=>p.jugador_id===jId&&p.tipo===tipo);
  const cur=p?.estado||'debe';
  const next=estados[(estados.indexOf(cur)+1)%estados.length];
  setSyncing('syncing');
  try{
    if(p){
      const {error}=await sb.from('pagos').update({estado:next}).eq('jugador_id',jId).eq('tipo',tipo);
      if(error)throw error;
      p.estado=next;
    }else{
      const {data,error}=await sb.from('pagos').insert({jugador_id:jId,tipo,estado:next}).select().single();
      if(error)throw error;
      pagos.push(data);
    }
    // sincronizar transporte si es viaje
    if(tipo==='viaje'){
      const j=jugadores.find(j=>j.id===jId);
      if(j){
        let t=j.transporte;
        if(next==='noaplica')t='propio';
        else if(next==='pagado'||next==='parcial')t='colectivo';
        else t='none';
        if(t!==j.transporte){
          await sb.from('jugadores').update({transporte:t}).eq('id',jId);
          j.transporte=t;
        }
      }
    }
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderPagos(filtroActivo);
}

function renderPagos(filtro){
  const lista=document.getElementById('lista-pagos');
  if(!jugadores.length){lista.innerHTML='<div style="color:var(--suave);font-size:.83em;padding:10px 0">Agregá jugadores primero.</div>';return}
  const tipos=filtro==='todos'?TIPOS:[filtro];
  let html='';
  tipos.forEach(tipo=>{
    html+=`<div style="font-size:.62em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--suave);padding:10px 0 3px;border-top:1px solid var(--borde);margin-top:2px">${TLABELS[tipo]}</div>`;
    jugadores.forEach(j=>{
      const p=pagos.find(p=>p.jugador_id===j.id&&p.tipo===tipo);
      const est=p?.estado||'debe';
      html+=`<div class="pago-row">
        <div class="pago-nombre">${j.apellido}, ${j.nombre}</div>
        <div class="pago-estado ${est}" onclick="cicloPago('${tipo}',${j.id})">${LABELS[est]}</div>
      </div>`;
    });
  });
  lista.innerHTML=html;
}

async function ciclaTransporte(idx){
  const ciclo=['none','colectivo','propio'];
  const j=jugadores[idx];
  const cur=j.transporte||'none';
  const next=ciclo[(ciclo.indexOf(cur)+1)%ciclo.length];
  setSyncing('syncing');
  try{
    const {error}=await sb.from('jugadores').update({transporte:next}).eq('id',j.id);
    if(error)throw error;
    j.transporte=next;
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderViaje();
}

function renderViaje(){
  const col=jugadores.filter(j=>j.transporte==='colectivo');
  const prop=jugadores.filter(j=>j.transporte==='propio');
  const sin=jugadores.filter(j=>!j.transporte||j.transporte==='none');
  document.getElementById('col-count').textContent=`(${col.length})`;
  document.getElementById('propio-count').textContent=`(${prop.length})`;
  document.getElementById('sin-count').textContent=`(${sin.length})`;
  const itemHTML=j=>{
    const i=jugadores.indexOf(j);
    const cls=j.transporte==='colectivo'?'colectivo':j.transporte==='propio'?'propio':'none';
    const icon=j.transporte==='colectivo'?'🚌':j.transporte==='propio'?'🚗':'❓';
    return `<div class="viaje-item"><div class="vtoggle ${cls}" onclick="ciclaTransporte(${i})">${icon}</div><span>${j.apellido}, ${j.nombre}</span></div>`;
  };
  document.getElementById('lista-colectivo').innerHTML=col.map(itemHTML).join('')||'<div class="viaje-empty">Ninguno aún.</div>';
  document.getElementById('lista-propio').innerHTML=prop.map(itemHTML).join('')||'<div class="viaje-empty">Ninguno aún.</div>';
  document.getElementById('lista-sin').innerHTML=sin.map(itemHTML).join('')||'<div class="viaje-empty">Todos definidos ✓</div>';
}

async function cambiarCapacidad(hi,val){
  const cap=parseInt(val);
  setSyncing('syncing');
  try{
    const {error}=await sb.from('habitaciones').update({capacidad:cap}).eq('id',habitaciones[hi].id);
    if(error)throw error;
    habitaciones[hi].capacidad=cap;
    if(habitaciones[hi].ocupantes.length>cap){
      const sobran=habitaciones[hi].ocupantes.slice(cap);
      for(const jId of sobran){
        await sb.from('hab_ocupantes').delete().eq('habitacion_id',habitaciones[hi].id).eq('jugador_id',jId);
      }
      habitaciones[hi].ocupantes=habitaciones[hi].ocupantes.slice(0,cap);
    }
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderHabitaciones();
}

async function cambiarNro(hi,val){
  habitaciones[hi].nro=val;
  try{await sb.from('habitaciones').update({nro:val}).eq('id',habitaciones[hi].id)}catch(e){}
}

async function asignarHab(hi,jId){
  jId=parseInt(jId);if(!jId)return;
  const cap=habitaciones[hi].capacidad||3;
  if(habitaciones[hi].ocupantes.length>=cap){alert('Habitación llena ('+cap+' personas).');return}
  setSyncing('syncing');
  try{
    // quitar de otras habitaciones
    for(const h of habitaciones){
      if(h.ocupantes.includes(jId)&&h.id!==habitaciones[hi].id){
        await sb.from('hab_ocupantes').delete().eq('habitacion_id',h.id).eq('jugador_id',jId);
        h.ocupantes=h.ocupantes.filter(id=>id!==jId);
      }
    }
    const {error}=await sb.from('hab_ocupantes').insert({habitacion_id:habitaciones[hi].id,jugador_id:jId});
    if(error)throw error;
    habitaciones[hi].ocupantes.push(jId);
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderHabitaciones();
}

async function quitarDeHab(hi,jId){
  setSyncing('syncing');
  try{
    const {error}=await sb.from('hab_ocupantes').delete().eq('habitacion_id',habitaciones[hi].id).eq('jugador_id',jId);
    if(error)throw error;
    habitaciones[hi].ocupantes=habitaciones[hi].ocupantes.filter(id=>id!==jId);
    setSyncing('ok');
  }catch(e){setSyncing('err');toast('Error: '+e.message,'err');return}
  renderHabitaciones();
}

function renderHabitaciones(){
  const list=document.getElementById('hab-list');
  if(!habitaciones.length){list.innerHTML='<div style="color:var(--suave);font-size:.82em;padding:14px 0">Agregá habitaciones abajo.</div>';return}
  const asignados=new Set(habitaciones.flatMap(h=>h.ocupantes));
  list.innerHTML=habitaciones.map((h,hi)=>{
    const cap=h.capacidad||3;
    const llena=h.ocupantes.length>=cap;
    const ocHTML=h.ocupantes.length
      ?h.ocupantes.map(id=>{const j=jugadores.find(j=>j.id===id);return j?`<li class="hab-ocupante">👤 ${j.apellido}, ${j.nombre}<span class="hab-remove" onclick="quitarDeHab(${hi},${id})">✕</span></li>`:''}).join('')
      :`<li class="hab-empty">Sin asignar</li>`;
    const libres=jugadores.filter(j=>!asignados.has(j.id)||h.ocupantes.includes(j.id)).filter(j=>!h.ocupantes.includes(j.id));
    return `<div class="hab-card">
      <div class="hab-header">
        <div class="hab-nombre">🚪 ${h.nombre}</div>
        <span class="hab-cap-badge">${h.ocupantes.length}/${cap}</span>
        <select class="hab-cap-select" onchange="cambiarCapacidad(${hi},this.value)">
          ${[2,3,4,5].map(n=>`<option value="${n}"${cap===n?' selected':''}>${n} pers.</option>`).join('')}
        </select>
        <input class="hab-num-input" type="text" placeholder="N° hab." value="${h.nro||''}" oninput="cambiarNro(${hi},this.value)">
        <button class="hab-delete" onclick="eliminarHabitacion(${hi})">✕</button>
      </div>
      <ul class="hab-ocupantes">${ocHTML}</ul>
      ${llena
        ?`<div class="hab-llena">⚠ Habitación completa</div>`
        :(libres.length?`<select class="hab-select" onchange="asignarHab(${hi},this.value)"><option value="">+ Agregar persona…</option>${libres.map(j=>`<option value="${j.id}">${j.apellido}, ${j.nombre}</option>`).join('')}</select>`:'')
      }
    </div>`;
  }).join('');
}

// ── LISTA BF ─────────────────────────────────────────────────────────────
function renderBuenaFe(){
  const tbl=document.getElementById('buenafe-table');
  if(!jugadores.length){tbl.innerHTML='<tr><td style="color:var(--suave);padding:18px">Sin jugadores.</td></tr>';return}
  let html=`<thead><tr><th>#</th><th>Apellido</th><th>Nombre</th><th>DNI</th><th>F. Nac.</th><th>T° y F°</th><th>Profesión</th></tr></thead><tbody>`;
  jugadores.forEach((j,i)=>{
    const fnac=j.fnac?new Date(j.fnac+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
    const tf=j.tomo?(j.folio?`T° ${j.tomo} - F° ${j.folio}`:j.tomo):'';
    html+=`<tr><td class="num-col">${i+1}</td><td><strong>${j.apellido}</strong></td><td>${j.nombre}</td><td>${j.dni||''}</td><td>${fnac}</td><td>${tf}</td><td>${j.titulo||''}</td></tr>`;
  });
  tbl.innerHTML=html+'</tbody>';
}

function actualizarBadge(){
  const n=jugadores.length;
  document.getElementById('badge-total').textContent=n+(n===1?' persona':' personas');
}

// ── SYNC SILENCIOSO (refresca sin recargar página) ───────────────────────
async function syncDesdeDB(){
  if(saving) return; // no sincronizar mientras se está guardando
  try{
    const tabActiva=document.querySelector('.section.active')?.id?.replace('sec-','');
    const {data:jData}  = await sb.from('jugadores').select('*').order('apellido');
    const {data:pData}  = await sb.from('pagos').select('*');
    const {data:hData}  = await sb.from('habitaciones').select('*').order('id');
    const {data:ocData} = await sb.from('hab_ocupantes').select('*');
    if(!jData) return;
    jugadores    = jData.map(j=>({...j,docs:{dni:j.doc_dni,titulo:j.doc_titulo}}));
    pagos        = pData||[];
    habitaciones = (hData||[]).map(h=>({...h,ocupantes:(ocData||[]).filter(o=>o.habitacion_id===h.id).map(o=>o.jugador_id)}));
    actualizarBadge();
    if(tabActiva==='resumen')      renderResumen();
    if(tabActiva==='jugadores')    renderJugadores();
    if(tabActiva==='pagos')        renderPagos(filtroActivo);
    if(tabActiva==='viaje')        renderViaje();
    if(tabActiva==='habitaciones') renderHabitaciones();
    if(tabActiva==='buenafe')      renderBuenaFe();
    setSyncing('ok');
  }catch(e){ setSyncing('err'); }
}

// ── ARRANCAR ──────────────────────────────────────────────────────────────
init();

// Refresca cada 8 segundos
setInterval(syncDesdeDB, 8000);

// Refresca cuando volvés a la pestaña (celu ↔ compu)
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible') syncDesdeDB();
});
</script>
